<script>
const packs = JSON.parse(document.getElementById('packData').textContent);
const $ = (s, root=document) => root.querySelector(s);
const packList = $('#packList');
const searchPanel = $('#searchPanel'), toggleSearchBtn = $('#toggleSearchBtn');
const normalize = s => (s || '').toLowerCase().replace(/[’`]/g,"'").trim();
const esc = s => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const googleImages = name => 'https://www.google.com/search?tbm=isch&q=' + encodeURIComponent('Yu-Gi-Oh! ' + name);
const cardImageCache = new Map();
function cacheKey(cardName){ return 'ygotf2-card-img-' + normalize(cardName); }
function getCachedImage(cardName){
  const key = cacheKey(cardName);
  if (cardImageCache.has(key)) return cardImageCache.get(key);
  try { const saved = localStorage.getItem(key); if (saved) { cardImageCache.set(key, saved); return saved; } } catch(e) {}
  return null;
}
function setCachedImage(cardName, url){
  const key = cacheKey(cardName);
  cardImageCache.set(key, url);
  try { localStorage.setItem(key, url); } catch(e) {}
}
function rarityForIndex(index, total){
  const ratio = index / Math.max(total, 1);
  if (ratio <= 0.10) return {label:'Ultra Rare', cls:'rarity-ultra-rare'};
  if (ratio <= 0.25) return {label:'Super Rare', cls:'rarity-super-rare'};
  if (ratio <= 0.50) return {label:'Rare', cls:'rarity-rare'};
  return {label:'Common', cls:'rarity-common'};
}
const uniqueCards = new Set(packs.flatMap(p => p.cards.map(c => normalize(c.name))));
$('#packStat').textContent = packs.length + ' חבילות';
$('#cardStat').textContent = uniqueCards.size.toLocaleString() + ' קלפים ייחודיים';
function coverSrcByName(name) { return 'https://db.ygoprodeck.com/api/v7/cardinfo.php?name=' + encodeURIComponent(name); }
async function loadCover(img, coverName) {
  try { const r = await fetch(coverSrcByName(coverName)); if(!r.ok) throw new Error(); const j = await r.json(); const url = j?.data?.[0]?.card_images?.[0]?.image_url_small || j?.data?.[0]?.card_images?.[0]?.image_url; if(url) img.src = url; else throw new Error(); }
  catch(e) { img.replaceWith(Object.assign(document.createElement('div'), {className:'cover cover-fallback', textContent:coverName || 'No image'})); }
}
function highlightText(text, query) {
  if (!query) return esc(text);
  const nText = normalize(text), nQuery = normalize(query);
  const start = nText.indexOf(nQuery);
  if (start < 0) return esc(text);
  const end = start + nQuery.length;
  return esc(text.slice(0, start)) + '<mark>' + esc(text.slice(start, end)) + '</mark>' + esc(text.slice(end));
}

async function getCardImageUrl(cardName) {
  const cached = getCachedImage(cardName);
  if (cached) return cached;
  const r = await fetch(coverSrcByName(cardName));
  if (!r.ok) throw new Error('not found');
  const j = await r.json();
  const url = j?.data?.[0]?.card_images?.[0]?.image_url || j?.data?.[0]?.card_images?.[0]?.image_url_small;
  if (!url) throw new Error('not found');
  setCachedImage(cardName, url);
  return url;
}
async function toggleCardPreview(btn) {
  const name = btn.dataset.cardName || '';
  const preview = $('.card-preview', btn);
  if (!preview) return;
  if (btn.classList.contains('open')) {
    btn.classList.remove('open');
    btn.setAttribute('aria-expanded','false');
    return;
  }
  document.querySelectorAll('.card-link.open').forEach(other => {
    if (other !== btn) { other.classList.remove('open'); other.setAttribute('aria-expanded','false'); }
  });
  btn.classList.add('open','loading');
  btn.setAttribute('aria-expanded','true');
  if (btn.dataset.imageLoaded === 'true') { btn.classList.remove('loading'); return; }
  preview.innerHTML = '<span class="msg">טוען תמונת קלף...</span>';
  try {
    const url = await getCardImageUrl(name);
    preview.innerHTML = `<img src="${esc(url)}" alt="${esc(name)}" loading="lazy">`;
    btn.dataset.imageLoaded = 'true';
  } catch(e) {
    preview.innerHTML = '<span class="msg">לא נמצאה תמונה, פותח חיפוש בגוגל תמונות...</span>';
    window.open(googleImages(name), '_blank', 'noopener');
  } finally {
    btn.classList.remove('loading');
  }
}
function render() {
  packList.innerHTML = '';
  packs.forEach(p => {
    const cardsHtml = p.cards.map(c => { const rarity = rarityForIndex(c.index, p.cards.length); return `<button class="card-link ${rarity.cls}" type="button" data-card-name="${esc(c.name)}" aria-expanded="false"><span class="num">${String(c.index).padStart(2,'0')}</span><span class="card-name">${esc(c.name)}</span><span class="rarity-badge">${rarity.label}</span><span class="card-preview" aria-live="polite"></span></button>`; }).join('');
    const pack = document.createElement('article'); pack.className = 'pack'; pack.id = 'pack-' + p.num; pack.dataset.pack = normalize(p.name + ' ' + p.obtainName); pack.dataset.cards = p.cards.map(c=>normalize(c.name)).join(' | ');
    pack.innerHTML = `<div class="pack-head"><img class="cover" alt="${esc(p.cover)}" loading="lazy"><div><h3 class="pack-title">${p.num} - ${esc(p.name)}</h3><div class="meta">Cover Image: ${esc(p.cover)} · ${p.cards.length.toLocaleString()} cards${p.allCards ? ' · contains all cards from all packs' : ''}</div></div><button class="pack-toggle" type="button" aria-expanded="true">קפל חבילה ▲</button></div><div class="pack-body"><div class="obtain-inline"><strong>How to obtain:</strong> ${esc((p.how||[]).join(' · ') || 'Not specified')}</div><div class="cards">${cardsHtml}</div></div>`;
    packList.appendChild(pack); loadCover($('.cover', pack), p.cover);
  });
}
function applyFilters() {
  const pq = normalize($('#packSearch').value), cqRaw = $('#cardSearch').value, cq = normalize(cqRaw); let shown = 0;
  document.querySelectorAll('.card-link').forEach(link => {
    const original = link.dataset.cardName || '';
    $('.card-name', link).innerHTML = highlightText(original, cqRaw);
    link.classList.toggle('matched-card', !!cq && normalize(original).includes(cq));
  });
  document.querySelectorAll('.pack').forEach(pack => {
    const byPack = !pq || pack.dataset.pack.includes(pq);
    const byCard = !cq || pack.dataset.cards.includes(cq);
    const show = byPack && byCard; pack.classList.toggle('hidden', !show); if(show) shown++;
  });
  $('#empty').classList.toggle('hidden', shown !== 0); $('#resultCount').textContent = shown + ' מתוך ' + packs.length + ' חבילות מוצגות';
}
packList.addEventListener('click', e => {
  const toggle = e.target.closest('.pack-toggle');
  if (toggle) {
    const pack = toggle.closest('.pack');
    const collapsed = pack.classList.toggle('collapsed');
    toggle.setAttribute('aria-expanded', String(!collapsed));
    toggle.textContent = collapsed ? 'פתח חבילה ▼' : 'קפל חבילה ▲';
    return;
  }
  const btn = e.target.closest('.card-link');
  if (btn) toggleCardPreview(btn);
});
render(); applyFilters();
['packSearch','cardSearch'].forEach(id => $('#'+id).addEventListener('input', applyFilters));
$('#clearBtn').addEventListener('click', () => { $('#packSearch').value=''; $('#cardSearch').value=''; applyFilters(); });
toggleSearchBtn.addEventListener('click', () => {
  const isHidden = document.body.classList.toggle('header-collapsed');
  searchPanel.classList.toggle('collapsed', isHidden);
  document.body.classList.toggle('search-area-hidden', isHidden);
  toggleSearchBtn.setAttribute('aria-expanded', String(!isHidden));
  toggleSearchBtn.textContent = isHidden ? 'הצג אזור חיפוש ▼' : 'הסתר את כל אזור החיפוש ▲';
});
</script>
